<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Create Account | Cybersecurity Hub
    </title>

    <meta name="description"
          content="Create your Cybersecurity Hub account and continue your cybersecurity learning journey.">

    <meta name="robots"
          content="index, follow">

    <link rel="canonical"
          href="https://surajbhai126.github.io/Surajsecops/register.html">

    <link rel="stylesheet"
          href="style.css">

</head>


<body>


<!-- Navigation -->

<nav class="navbar">

    <div class="logo">
        🛡️ Cybersecurity Hub
    </div>


    <div class="nav-links">

        <a href="index.html">
            Home
        </a>

        <a href="cybersecurity.html">
            Cybersecurity
        </a>

        <a href="networking.html">
            Networking
        </a>

        <a href="vapt.html">
            VAPT
        </a>

        <a href="tools.html">
            Tools
        </a>

    </div>

</nav>


<!-- Register Section -->

<main class="auth-page">


    <div class="auth-card">


        <div class="auth-icon">
            🚀
        </div>


        <h1>
            Create Account
        </h1>


        <p class="auth-subtitle">
            Start your cybersecurity learning journey today.
        </p>


        <form id="registerForm">


            <label for="name">
                Full Name
            </label>


            <input
                type="text"
                id="name"
                placeholder="Enter your full name"
                required>


            <label for="email">
                Email Address
            </label>


            <input
                type="email"
                id="email"
                placeholder="Enter your email"
                required>


            <label for="password">
                Password
            </label>


            <input
                type="password"
                id="password"
                placeholder="Create a password"
                required>


            <label for="confirmPassword">
                Confirm Password
            </label>


            <input
                type="password"
                id="confirmPassword"
                placeholder="Confirm your password"
                required>


            <button
                type="submit"
                class="auth-btn">

                Create Account

            </button>


        </form>


        <p
            id="registerMessage"
            class="auth-message">
        </p>


        <div class="auth-links">

            <p>

                Already have an account?

                <a href="login.html">
                    Login Here
                </a>

            </p>

        </div>


    </div>


</main>


<!-- Footer -->

<footer>

    <h3>
        🛡️ Cybersecurity Hub
    </h3>


    <p>
        Learn Cybersecurity. Build Your Future.
    </p>


    <p class="copyright">
        © 2026 Cybersecurity Hub.
        All Rights Reserved.
    </p>

</footer>
<script type="module" src="auth.js"></script>

</body>

</html>
